name: Build macOS branch DLL

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: true
        default: macos/native-audio

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.x

      - name: Build drag-and-drop macOS DLL
        shell: pwsh
        run: ./scripts/package-macos.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfectCommsmacOS
          path: artifacts/PerfectCommsmacOS.dll
