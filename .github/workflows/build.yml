name: Build Mega Chujowe Perfect Comms

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: proxy-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_FILE: PerfectComms.csproj
  DLL_NAME: MegaChujowePerfectComms.dll

jobs:
  build:
    name: Build DLL
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore $env:PROJECT_FILE

      - name: Build
        run: dotnet build $env:PROJECT_FILE --configuration Release --no-restore

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item "bin/Release/net6.0/$env:DLL_NAME" "artifacts/$env:DLL_NAME" -Force
          if (Test-Path README.md) {
            Copy-Item README.md artifacts/README.md -Force
          }
          if (Test-Path "docs/release-notes-${{ github.ref_name }}.md") {
            Copy-Item "docs/release-notes-${{ github.ref_name }}.md" artifacts/PATCH_NOTES.md -Force
          } else {
            @(
              "Mega Chujowe Perfect Comms ${{ github.ref_name }}"
              ""
              "Download this fork release from:"
              "https://github.com/marzecoo/Chujowe-Perfect-Comms/releases/latest"
              ""
              "This build is made for Town Of Us Mega Chujowe Extension:"
              "https://github.com/HekerB/TownOfUsMegaChujoweExtension"
            ) | Set-Content -Path artifacts/PATCH_NOTES.md -Encoding UTF8
          }

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: MegaChujowePerfectComms
          path: artifacts
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/PATCH_NOTES.md
          files: artifacts/MegaChujowePerfectComms.dll
