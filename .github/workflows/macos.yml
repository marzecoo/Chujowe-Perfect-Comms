name: PerfectComms macOS DLL

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-dll:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.x

      - name: Build drag-and-drop macOS DLL
        shell: pwsh
        run: ./scripts/package-macos.ps1

      - name: Verify macOS DLL artifact
        shell: pwsh
        run: |
          $dll = "artifacts/PerfectCommsmacOS.dll"
          if (-not (Test-Path -LiteralPath $dll)) { throw "missing $dll" }
          $asm = [Reflection.Assembly]::LoadFile((Resolve-Path $dll).Path)
          if ($asm.GetName().Name -ne "PerfectCommsmacOS") { throw "wrong assembly name: $($asm.GetName().Name)" }
          $resources = $asm.GetManifestResourceNames()
          if (-not ($resources -contains "Lib.libperfectcomms_audio_macos.dylib")) { throw "missing embedded macOS dylib" }
          if ($resources | Where-Object { $_ -like "*NAudio.WinMM*" -or $_ -like "*rnnoise.x64*" -or $_ -like "*rnnoise.x86*" }) {
            throw "macOS DLL contains Windows-only embedded resources"
          }
          Get-FileHash -Algorithm SHA256 -LiteralPath $dll

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfectCommsmacOS
          path: artifacts/PerfectCommsmacOS.dll

      - name: Upload tag release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "PerfectComms macOS drag-and-drop DLL"
          gh release upload "$tag" artifacts/PerfectCommsmacOS.dll --clobber
